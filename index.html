<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your First Order | Mood</title>
<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; }
 
body {
  margin: 0;
  padding: 20px 16px 24px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #FFFFFF;
  -webkit-font-smoothing: antialiased;
}
 
/* ── WIDGET SHELL ── */
#widget {
  max-width: 500px;
  margin: 0 auto;
  background: #FFFFFF;
  border: 1.5px solid rgba(27, 58, 47, 0.10);
  border-radius: 20px;
  padding: 28px 24px 20px;
  position: relative;
}
 
/* ── BADGE ── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 5px 14px;
  background: rgba(27, 58, 47, 0.07);
  border-radius: 100px;
  margin-bottom: 18px;
}
.badge-pip {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #1B3A2F;
  animation: breathe 2.6s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1);    opacity: 1;   }
  50%       { transform: scale(1.45); opacity: 0.55; }
}
.badge-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: #1B3A2F;
}
 
/* ── QUESTION SCREEN ── */
#screen-q {
  transition: opacity 0.22s ease, transform 0.22s ease;
}
#screen-q.exiting {
  opacity: 0;
  transform: translateY(-8px);
  pointer-events: none;
}
 
.heading {
  font-size: 22px;
  font-weight: 800;
  color: #1B3A2F;
  line-height: 1.2;
  letter-spacing: -0.025em;
  margin: 0 0 6px;
}
.subheading {
  font-size: 13.5px;
  color: #7A8B82;
  margin: 0 0 22px;
  line-height: 1.5;
}
 
/* ── TILE GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
 
.tile {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 17px 14px 15px;
  background: #FFFFFF;
  border: 1.5px solid rgba(27, 58, 47, 0.11);
  border-radius: 14px;
  text-align: left;
  cursor: pointer;
  overflow: hidden;
  /* staggered entrance */
  opacity: 0;
  transform: translateY(16px);
  animation: tileIn 0.42s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  transition:
    border-color 0.18s ease,
    background   0.18s ease,
    transform    0.2s  cubic-bezier(0.34, 1.56, 0.64, 1),
    box-shadow   0.18s ease,
    opacity      0.2s  ease;
}
.tile:nth-child(1) { animation-delay: 0.07s; }
.tile:nth-child(2) { animation-delay: 0.13s; }
.tile:nth-child(3) { animation-delay: 0.19s; }
.tile:nth-child(4) { animation-delay: 0.25s; }
 
@keyframes tileIn {
  to { opacity: 1; transform: translateY(0); }
}
 
/* Accent stripe (top) - grows in on hover */
.tile::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 14px 14px 0 0;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
}
 
.tile:hover {
  border-color: rgba(27, 58, 47, 0.28);
  transform: translateY(-3px);
  box-shadow: 0 8px 22px rgba(27, 58, 47, 0.11);
}
.tile:hover::before { transform: scaleX(1); }
.tile:active         { transform: translateY(-1px) scale(0.98); }
 
/* States after selection */
.tile.chosen {
  background: #1B3A2F;
  border-color: #1B3A2F;
  transform: scale(1.03);
  box-shadow: 0 12px 30px rgba(27, 58, 47, 0.28);
}
.tile.chosen::before   { transform: scaleX(1); background: rgba(255,255,255,0.2); }
.tile.chosen .t-label  { color: #FFFFFF; }
.tile.chosen .t-sub    { color: rgba(255,255,255,0.50); }
 
.tile.dimmed { opacity: 0.30; transform: scale(0.96); }
 
.t-icon  { font-size: 20px; line-height: 1; display: block; }
.t-label { font-size: 13px; font-weight: 700; color: #1B3A2F; line-height: 1.3; display: block; }
.t-sub   { font-size: 11px; color: #7A8B82;  line-height: 1.4; display: block; }
 
/* ── RESULT SCREEN ── */
#screen-r { display: none; }
#screen-r.entering {
  display: block;
  animation: resultIn 0.42s cubic-bezier(0.22, 1, 0.36, 1) both;
}
@keyframes resultIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0);    }
}
 
/* Accent colour bar */
.r-bar {
  height: 3px;
  border-radius: 3px;
  margin-bottom: 20px;
  transform-origin: left;
  animation: barGrow 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.08s both;
}
@keyframes barGrow {
  from { transform: scaleX(0); }
  to   { transform: scaleX(1); }
}
 
/* Result panel */
.r-panel {
  background: #F8F6F2;
  border-radius: 14px;
  padding: 20px 18px;
  margin-bottom: 14px;
}
.r-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: #9CB4A0;
  margin-bottom: 8px;
}
.r-name {
  font-size: 20px;
  font-weight: 800;
  color: #1B3A2F;
  letter-spacing: -0.025em;
  line-height: 1.2;
  margin-bottom: 9px;
}
.r-desc {
  font-size: 13px;
  color: #4A5D53;
  line-height: 1.65;
}
 
/* Shop CTA */
.r-cta {
  display: block;
  width: 100%;
  background: #1B3A2F;
  color: #FFFFFF;
  text-align: center;
  padding: 14px 20px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
  letter-spacing: 0.01em;
  transition: background 0.18s ease, transform 0.15s ease, box-shadow 0.18s ease;
  margin-bottom: 10px;
}
.r-cta:hover {
  background: #274f3c;
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(27, 58, 47, 0.24);
}
.r-cta:active { transform: translateY(0); box-shadow: none; }
 
/* Reset + age note */
.r-footer {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.r-reset {
  background: none;
  border: none;
  font-family: inherit;
  font-size: 12px;
  color: #7A8B82;
  cursor: pointer;
  padding: 4px 8px;
  transition: color 0.15s ease;
}
.r-reset:hover { color: #1B3A2F; }
 
.age-note {
  font-size: 10.5px;
  color: rgba(27, 58, 47, 0.38);
  text-align: center;
  margin-top: 14px;
  letter-spacing: 0.01em;
}
 
/* ── RESPONSIVE ── */
@media (max-width: 360px) {
  #widget  { padding: 22px 14px 18px; }
  .heading { font-size: 19px; }
  .tile    { padding: 14px 11px; }
  .t-icon  { font-size: 18px; }
  .t-label { font-size: 12px; }
}
</style>
</head>
<body>
 
<div id="widget">
 
  <!-- ── QUESTION SCREEN ── -->
  <div id="screen-q">
 
    <div class="badge">
      <span class="badge-pip"></span>
      <span class="badge-label">Mood delivers</span>
    </div>
 
    <h2 class="heading">Find Your First Order</h2>
    <p class="subheading">What kind of session are you after?</p>
 
    <div class="grid">
 
      <button class="tile" style="--accent:#C5B9E0;" data-idx="0">
        <span class="t-icon">🌿</span>
        <span class="t-label">Relaxed &amp; Easy</span>
        <span class="t-sub">smooth and laid-back</span>
      </button>
 
      <button class="tile" style="--accent:#E8B4B8;" data-idx="1">
        <span class="t-icon">✨</span>
        <span class="t-label">Creative &amp; Uplifted</span>
        <span class="t-sub">energized and social</span>
      </button>
 
      <button class="tile" style="--accent:#9CB4A0;" data-idx="2">
        <span class="t-icon">🍃</span>
        <span class="t-label">Classic &amp; Traditional</span>
        <span class="t-sub">the original experience</span>
      </button>
 
      <button class="tile" style="--accent:#D4A04A;" data-idx="3">
        <span class="t-icon">🔥</span>
        <span class="t-label">Bold &amp; Potent</span>
        <span class="t-sub">high-potency, all the way</span>
      </button>
 
    </div>
 
    <p class="age-note">Must be 21 or older to purchase.</p>
 
  </div>
 
  <!-- ── RESULT SCREEN ── -->
  <div id="screen-r">
    <div class="r-bar" id="r-bar"></div>
    <div class="r-panel">
      <div class="r-eyebrow">We think you&rsquo;d love</div>
      <div class="r-name" id="r-name"></div>
      <div class="r-desc" id="r-desc"></div>
    </div>
    <a href="#" id="r-cta" class="r-cta" target="_blank" rel="noopener noreferrer"></a>
    <div class="r-footer">
      <button class="r-reset" id="r-reset">&#8593; Try again</button>
    </div>
    <p class="age-note">Must be 21 or older to purchase. &nbsp;|&nbsp; Hemp-derived THC may affect a drug test.</p>
  </div>
 
</div>
 
<script>
(function () {
 
  var DATA = [
    {
      name:   "Gummies &amp; Edibles",
      desc:   "A smooth entry point to hemp-derived THC. Delta-9 gummies are easy to enjoy, available in several formulas, and deliver a long-lasting experience without the need to smoke.",
      cta:    "Shop Gummies \u2192",
      url:    "https://mood.com/shop/product-category/gummies",
      accent: "#C5B9E0"
    },
    {
      name:   "Vapes &amp; Pre-Rolls",
      desc:   "For sessions that feel energized and social. Mood\u2019s sativa vapes and pre-rolls deliver an uplifted, free-flowing experience. Fast-acting and ready whenever you are.",
      cta:    "Shop Vapes \u2192",
      url:    "https://mood.com/shop/product-category/vapes",
      accent: "#E8B4B8"
    },
    {
      name:   "Cannabis Flower",
      desc:   "Indica, sativa, and hybrid flower grown by American farmers. Economy, premium, and top-shelf options all in one place. The original way to enjoy hemp-derived THC.",
      cta:    "Shop Flower \u2192",
      url:    "https://mood.com/shop/product-category/flower",
      accent: "#9CB4A0"
    },
    {
      name:   "Concentrates",
      desc:   "THCa Diamonds, dab badder, and more. High-potency and terpene-rich. The strongest selections in the Mood lineup, built for consumers who want to turn it up.",
      cta:    "Shop Concentrates \u2192",
      url:    "https://mood.com/shop/product-category/concentrates",
      accent: "#D4A04A"
    }
  ];
 
  var screenQ = document.getElementById('screen-q');
  var screenR = document.getElementById('screen-r');
  var rBar    = document.getElementById('r-bar');
  var rName   = document.getElementById('r-name');
  var rDesc   = document.getElementById('r-desc');
  var rCta    = document.getElementById('r-cta');
  var rReset  = document.getElementById('r-reset');
  var tiles   = document.querySelectorAll('.tile');
 
  // ── SELECT ──
  tiles.forEach(function (tile) {
    tile.addEventListener('click', function () {
      var idx = parseInt(this.getAttribute('data-idx'), 10);
 
      // Dim others, highlight chosen
      tiles.forEach(function (t) { t.classList.add('dimmed'); });
      this.classList.remove('dimmed');
      this.classList.add('chosen');
 
      // Brief pause so the selection animation lands, then transition
      setTimeout(function () {
        showResult(idx);
      }, 180);
    });
  });
 
  // ── SHOW RESULT ──
  function showResult(idx) {
    var d = DATA[idx];
    rName.innerHTML    = d.name;
    rDesc.textContent  = d.desc;
    rCta.innerHTML     = d.cta;
    rCta.href          = d.url;
    rBar.style.background = d.accent;
 
    screenQ.classList.add('exiting');
 
    setTimeout(function () {
      screenQ.style.display = 'none';
      screenR.classList.remove('entering');
      screenR.style.display = 'block';
      // Force reflow so animation re-triggers cleanly on repeat plays
      void screenR.offsetHeight;
      screenR.classList.add('entering');
      ping();
    }, 240);
  }
 
  // ── RESET ──
  rReset.addEventListener('click', function () {
    screenR.classList.remove('entering');
    screenR.style.display = 'none';
    tiles.forEach(function (t) { t.classList.remove('chosen', 'dimmed'); });
    screenQ.style.display = '';
    screenQ.classList.remove('exiting');
    ping();
  });
 
  // ── IFRAME AUTO-HEIGHT ──
  function ping() {
    var h = Math.max(
      document.body.scrollHeight,
      document.documentElement.scrollHeight
    );
    try { window.parent.postMessage({ type: 'resize', height: h }, '*'); } catch (e) {}
  }
 
  window.addEventListener('load',   ping);
  window.addEventListener('resize', ping);
 
}());
</script>
 
</body>
</html>
